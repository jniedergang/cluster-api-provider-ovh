# Cluster Autoscaler for CAPI-managed workload clusters.
#
# The autoscaler scales MachineDeployments up/down based on pending pods.
# It uses the standard CAPI cloud provider — no OVH-specific code needed.
#
# Prerequisites:
# 1. The MachineDeployment (or ClusterClass worker) must have the
#    autoscaler annotations:
#      cluster.x-k8s.io/cluster-api-autoscaler-node-group-min-size: "1"
#      cluster.x-k8s.io/cluster-api-autoscaler-node-group-max-size: "10"
#    The ClusterClass exposes workerMinReplicas / workerMaxReplicas
#    variables for this.
# 2. The autoscaler runs on the MANAGEMENT cluster (not the workload
#    cluster) because it needs access to CAPI MachineDeployment resources.
#
# Deploy on the management cluster:
#   kubectl apply -f cluster-autoscaler-helmchartconfig.yaml
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: cluster-autoscaler
  namespace: kube-system
spec:
  repo: https://kubernetes.github.io/autoscaler
  chart: cluster-autoscaler
  version: "9.43.2"
  targetNamespace: kube-system
  valuesContent: |-
    cloudProvider: clusterapi
    autoDiscovery:
      clusterName: ""
    extraArgs:
      logtostderr: true
      v: 4
      scale-down-delay-after-add: 5m
      scale-down-unneeded-time: 5m
      max-graceful-termination-sec: 600
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        effect: NoSchedule

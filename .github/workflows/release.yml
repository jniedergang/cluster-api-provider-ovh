name: release

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cluster-api-provider-ovhcloud
  TAG: ${{ github.ref_name }}
  ORG: ${{ github.repository_owner }}

jobs:
  build:
    name: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker login
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  helm:
    name: helm-chart
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      packages: write
    if: hashFiles('chart/cluster-api-provider-ovhcloud/Chart.yaml') != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Package and push Helm chart
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"  # strip leading v
          helm package chart/cluster-api-provider-ovhcloud --version "${VERSION}" --app-version "${{ github.ref_name }}"
          helm push "cluster-api-provider-ovhcloud-${VERSION}.tgz" "oci://${{ env.REGISTRY }}/${{ env.ORG }}/charts"

  release:
    name: github-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate release manifests
        run: make release-manifests RELEASE_TAG=${{ env.TAG }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view ${{ github.ref_name }} > /dev/null 2>&1; then
            echo "${{ github.ref_name }} release exists"
          else
            gh release create ${{ github.ref_name }} --generate-notes
          fi
          for f in metadata.yaml infrastructure-components.yaml cluster-template.yaml cluster-template-kubeadm.yaml clusterclass-ovhcloud-rke2.yaml; do
            if [ -f "out/${f}" ]; then
              gh release upload ${{ github.ref_name }} "out/${f}" --clobber
            fi
          done

# This role will be generated by controller-gen once controllers are implemented.
# Placeholder for kustomize build to succeed.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - infrastructure.cluster.x-k8s.io
  resources:
  - ovhclusters
  - ovhclusters/status
  - ovhclusters/finalizers
  - ovhmachines
  - ovhmachines/status
  - ovhmachines/finalizers
  - ovhmachinetemplates
  - ovhclustertemplates
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - cluster.x-k8s.io
  resources:
  - clusters
  - clusters/status
  - machines
  - machines/status
  - machinesets
  - machinedeployments
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - secrets
  - events
  verbs:
  - get
  - list
  - watch
  - create
  - patch

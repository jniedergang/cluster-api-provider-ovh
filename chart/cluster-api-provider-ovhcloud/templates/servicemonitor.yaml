{{- if .Values.metrics.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "capiovh.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "capiovh.labels" . | nindent 4 }}
    control-plane: controller-manager
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      {{- include "capiovh.selectorLabels" . | nindent 6 }}
  endpoints:
    - path: /metrics
      port: metrics
      scheme: http
{{- end }}
